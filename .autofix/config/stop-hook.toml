# Configuration for the autofix stop hook.
# This file is read by scripts/stop_hook_autofix.sh.

# Set to false to disable the autofix stop hook entirely.
enabled = true

# Extra input appended to the /autofix command in the stop hook message.
# The agent sees "Run: /autofix <extra_args>" and passes this text to the skill.
# Examples:
#   extra_args = "Only fix MAJOR and CRITICAL issues."
#   extra_args = "Focus only on logic_error and runtime_error_risk categories."
extra_args = ""
