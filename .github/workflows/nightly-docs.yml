name: Nightly Docs Update

on:
  schedule:
    - cron: "0 7 * * *" # Daily at 7am UTC (midnight PDT)
  workflow_dispatch: # Manual trigger

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history needed for git log

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are maintaining two living documents in this repository:
            ARCHITECTURE.md (developer architecture overview) and CHANGELOG.md (user-facing changelog).

            ## Step 1: Determine what changed

            Look at the git log for commits on main since the last time these docs were updated.
            First, get the anchor date:

              git log -1 --format=%ci -- CHANGELOG.md ARCHITECTURE.md

            If that returns empty (the files don't exist yet), use "7 days ago" instead.
            Then find all commits since that anchor:

              git log --oneline --since="<anchor>"

            If that returns nothing, verify there have been *some* commits in the last 3 days:

              git log --oneline --since="3 days ago" -1

            If that also returns nothing, output "WARNING: no commits found in the last 3 days"
            and exit with a non-zero status. Otherwise, there are simply no changes to document --
            exit early without making changes.

            Read the diffs, focusing on structural and user-facing changes:

              git diff <oldest_relevant_commit>..HEAD

            ## Step 2: Update ARCHITECTURE.md (if needed)

            Read the current ARCHITECTURE.md. Update it if the commits changed the architecture.
            The bar is high -- most days there should be no changes.

            ## Step 3: Update CHANGELOG.md

            Append new entries to CHANGELOG.md for user-visible changes. Follow the existing
            format in the file. Skip internal-only changes.

            ## Step 4: Commit and create PR

            If you made any changes, commit them and push to a new branch named
            "docs/nightly-update-YYYY-MM-DD" (using today's date). Then create a PR.

            If no changes were needed, do nothing.
          claude_args: |
            --model claude-opus-4-20250514
            --allowedTools Read,Write,Edit,Bash(git:*),Bash(gh pr create:*),Bash(date:*)
